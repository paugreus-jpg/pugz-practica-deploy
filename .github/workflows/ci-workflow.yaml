name: Java CI & Quality Gate

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Validar nombre de la rama (Ej: feature/..., bugfix/..., hotfix/...)
      - name: Validate Branch Name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          REGEX="^(feature|bugfix|hotfix|task)\/[a-zA-Z0-9_-]+$"
          if [[ ! $BRANCH_NAME =~ $REGEX ]]; then
            echo "ERROR: El nombre de la rama '$BRANCH_NAME' no sigue la convención."
            echo "Usa: feature/..., bugfix/..., hotfix/... o task/..."
            exit 1
          fi

      # 2. Configurar Entorno
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Validar Formato de Commits (Conventional Commits)
      # Esto revisa que los commits del PR empiecen por feat:, fix:, docs:, etc.
      - name: Validate Commit Messages
        uses: wagoid/commitlint-github-action@v5

      # 4. Ejecutar Build (Sin tests primero para asegurar compilación)
      - name: Build Project
        run: mvn clean compile

      # 5. Ejecutar Tests Automáticos
      - name: Run Tests
        run: mvn test